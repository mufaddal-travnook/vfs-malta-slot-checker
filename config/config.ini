[browser]
type = chromium
; Prod runs headless (no display). Set to false locally to watch the run.
headless = false
; To attach to an already-running Chrome instead of launching our own, set a
; CDP url (e.g. http://127.0.0.1:9222). Leave BLANK in prod so the bot launches
; its own headless Chromium.
cdp_url = http://127.0.0.1:9222

[vfs-credential]
; A VFS account registered on the UAE -> Malta portal.
; DO NOT commit real credentials. Either fill these in a LOCAL copy that is
; gitignored, or override them via VFS_BOT_CONFIG_PATH (see README).
email = your.registered.email@example.com
password = your-password

[telegram]
; Where the slot report is sent. Create a bot via @BotFather for bot_token, and
; use @userinfobot (or the getUpdates API) to find your chat_id. Leave blank to
; only log the report.
bot_token =
chat_id =

[logging]
; Verbosity of the app log (console + app.log). One of: DEBUG, INFO, WARNING,
; ERROR. DEBUG surfaces the fine-grained step logs (cookie reject, turnstile
; token, etc.). Override at runtime with the LOG_LEVEL env var.
level = INFO
; When true, also log browser activity: page navigations, every network
; request/response, browser console messages and page errors. VERY noisy —
; leave false for clean progress logs; set true (with level = DEBUG) only when
; debugging. Override with BROWSER_ACTIVITY_LOG.
browser_activity = false
